services:
  ruview:
    build:
      context: .
      dockerfile: docker/Dockerfile.rust
    container_name: ruview
    ports:
      - "7777:3000"
      - "3001:3001"
      - "5005:5005/udp"
    environment:
      - RUST_LOG=info
      - CSI_SOURCE=auto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
